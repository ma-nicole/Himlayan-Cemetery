name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend on GitHub
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
          CI: false
        run: |
          npm ci
          npm run build

      - name: Deploy backend via SSH (attempt 1)
        id: backend_deploy_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        env: &backend_ssh_env
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          BRANCH: main
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          APP_URL: ${{ secrets.APP_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'himlayang-push' }}
          MAIL_MAILER: ${{ secrets.MAIL_MAILER }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION: ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          MAIL_FEEDBACK_TO: ${{ secrets.MAIL_FEEDBACK_TO }}
          FRONTEND_PUBLIC_PATH: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
        with: &backend_ssh_with
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          timeout: 60s
          command_timeout: 5m
          envs: REPO_URL,BRANCH,DEPLOY_PATH,APP_URL,FRONTEND_URL,FIREBASE_PROJECT_ID,FRONTEND_PUBLIC_PATH,MAIL_MAILER,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,MAIL_ENCRYPTION,MAIL_FROM_ADDRESS,MAIL_FROM_NAME,MAIL_FEEDBACK_TO
          script_stop: false
          script: |
            set -eux

            MAIL_MAILER="${MAIL_MAILER:-smtp}"

            quote_env_value_if_needed() {
              raw="$1"
              raw="$(printf '%s' "$raw" | tr -d '\r')"

              case "$raw" in
                *$'\n'*)
                  raw="$(printf '%s' "$raw" | tr '\n' ' ')"
                  ;;
              esac

              if [[ "$raw" =~ [[:space:]#] ]]; then
                escaped="$(printf '%s' "$raw" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g')"
                printf '"%s"' "$escaped"
              else
                printf '%s' "$raw"
              fi
            }

            sanitize_env_file() {
              file="$1"

              [ -f "$file" ] || return 0

              # Normalize line endings and strip UTF-8 BOM.
              sed -i 's/\r$//' "$file"
              sed -i '1s/^\xEF\xBB\xBF//' "$file"

              # Normalize KEY = value to KEY=value for valid dotenv parsing.
              awk '
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { print; next }
                /^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]*=/ {
                  line = $0
                  sub(/^[[:space:]]+/, "", line)
                  eq = index(line, "=")
                  key = substr(line, 1, eq - 1)
                  val = substr(line, eq + 1)
                  sub(/[[:space:]]+$/, "", key)
                  sub(/^[[:space:]]+/, "", val)
                  print key "=" val
                  next
                }
                { print }
              ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            }

            upsert_env() {
              key="$1"
              val="$2"
              file="$3"

              if [ -z "${val}" ]; then
                return
              fi

              val="$(quote_env_value_if_needed "$val")"

              esc_val=$(printf '%s' "$val" | sed -e 's/[&/]/\\\\&/g')

              if grep -q "^${key}=" "$file"; then
                sed -i "s/^${key}=.*/${key}=${esc_val}/" "$file"
              else
                printf "\n%s=%s\n" "$key" "$val" >> "$file"
              fi
            }

            echo "Connected as $(whoami)"
            echo "Current dir: $(pwd)"
            echo "DEPLOY_PATH=$DEPLOY_PATH"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "HOSTINGER_DEPLOY_PATH is required"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "First deploy: cloning repository"
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
            else
              echo "Updating existing repository"
              cd "$DEPLOY_PATH"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
              # Force the working tree to exactly match the remote — no stash/merge needed.
              git reset --hard origin/"$BRANCH"
              # Clean untracked files but preserve user uploads in storage
              git clean -fd -e backend/storage/app/public/ || true
            fi

            echo "Deploying backend"
            cd "$DEPLOY_PATH/backend"

            if [ -f .env ]; then
              sanitize_env_file ".env"
              upsert_env "APP_URL" "$APP_URL" ".env"
              upsert_env "FRONTEND_URL" "$FRONTEND_URL" ".env"
              upsert_env "FIREBASE_PROJECT_ID" "$FIREBASE_PROJECT_ID" ".env"
              upsert_env "MAIL_MAILER" "$MAIL_MAILER" ".env"
              upsert_env "MAIL_HOST" "$MAIL_HOST" ".env"
              upsert_env "MAIL_PORT" "$MAIL_PORT" ".env"
              upsert_env "MAIL_USERNAME" "$MAIL_USERNAME" ".env"
              upsert_env "MAIL_PASSWORD" "$MAIL_PASSWORD" ".env"
              upsert_env "MAIL_ENCRYPTION" "$MAIL_ENCRYPTION" ".env"
              upsert_env "MAIL_FROM_ADDRESS" "$MAIL_FROM_ADDRESS" ".env"
              upsert_env "MAIL_FROM_NAME" "$MAIL_FROM_NAME" ".env"
              upsert_env "MAIL_FEEDBACK_TO" "$MAIL_FEEDBACK_TO" ".env"
              sanitize_env_file ".env"
            fi

            # Ensure Laravel runtime directories exist before composer scripts run.
            mkdir -p bootstrap/cache
            mkdir -p storage/framework/cache
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            chmod -R ug+rwX bootstrap/cache storage || true

            if [ -f artisan ] && command -v composer >/dev/null 2>&1; then
              # Only run composer install when dependencies have actually changed.
              LOCK_HASH_FILE="$DEPLOY_PATH/.composer_lock_hash"
              CURRENT_HASH=$(md5sum composer.lock 2>/dev/null | awk '{print $1}' || echo "none")
              PREVIOUS_HASH=$(cat "$LOCK_HASH_FILE" 2>/dev/null || echo "")

              if [ "$CURRENT_HASH" != "$PREVIOUS_HASH" ]; then
                echo "composer.lock changed — running composer install"
                composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
                echo "$CURRENT_HASH" > "$LOCK_HASH_FILE"
              else
                echo "composer.lock unchanged — skipping composer install"
              fi
            else
              echo "Skipping composer install (composer/artisan not available)"
            fi

            if [ -f artisan ] && command -v php >/dev/null 2>&1; then
              if [ -f .env ]; then
                if ! grep -q "^APP_KEY=base64:" .env; then
                  php artisan key:generate --force || true
                fi
              fi

              php artisan config:clear || true
              php artisan cache:clear || true
              php artisan migrate --force || true
              php artisan optimize || true
            else
              echo "Skipping artisan commands (php/artisan not available)"
            fi

            # ── Frontend public dir setup (merged into same SSH session) ──
            if [ -n "$FRONTEND_PUBLIC_PATH" ]; then
              mkdir -p "$FRONTEND_PUBLIC_PATH"

              cat > "$FRONTEND_PUBLIC_PATH/.htaccess" <<'HTEOF'
            Options +FollowSymLinks
            RewriteEngine On
            RewriteRule ^\.storage_config$ - [F,L]
            RewriteCond %{REQUEST_URI} ^/api(/|$) [NC]
            RewriteRule ^ - [L]
            RewriteCond %{REQUEST_URI} ^/storage/
            RewriteRule ^storage/(.*)$ /storage.php?file=$1 [QSA,L]
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]
            RewriteRule . /index.html [L]
            HTEOF

              find "$FRONTEND_PUBLIC_PATH" -mindepth 1 -maxdepth 1 ! -name '.well-known' ! -name 'api' ! -name 'storage' ! -name '.htaccess' -exec rm -rf {} +

              mkdir -p "$FRONTEND_PUBLIC_PATH/api"

              cat > "$FRONTEND_PUBLIC_PATH/api/.htaccess" <<'HTEOF'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
            HTEOF

              cat > "$FRONTEND_PUBLIC_PATH/api/index.php" <<PHPEOF
            <?php
            define('LARAVEL_START', microtime(true));
            \$uri = \$_SERVER['REQUEST_URI'] ?? '/';
            if (!str_starts_with(\$uri, '/api')) {
              \$_SERVER['REQUEST_URI'] = '/api' . (str_starts_with(\$uri, '/') ? \$uri : '/' . \$uri);
            }
            \$_SERVER['SCRIPT_NAME'] = '/index.php';
            \$_SERVER['PHP_SELF'] = '/index.php';
            unset(\$_SERVER['PATH_INFO']);
            require '${DEPLOY_PATH}/backend/vendor/autoload.php';
            \$app = require_once '${DEPLOY_PATH}/backend/bootstrap/app.php';
            \$kernel = \$app->make(Illuminate\Contracts\Http\Kernel::class);
            \$response = \$kernel->handle(\$request = Illuminate\Http\Request::capture())->send();
            \$kernel->terminate(\$request, \$response);
            PHPEOF

              mkdir -p "$DEPLOY_PATH/backend/storage/app/public/deceased_photos"
              mkdir -p "$DEPLOY_PATH/backend/storage/app/public/avatars"

              STORAGE_TARGET="$DEPLOY_PATH/backend/storage/app/public"
              STORAGE_LINK="$FRONTEND_PUBLIC_PATH/storage"
              CURRENT_TARGET=$(readlink "$STORAGE_LINK" 2>/dev/null || echo "")
              if [ "$CURRENT_TARGET" = "$STORAGE_TARGET" ] && [ -e "$STORAGE_LINK" ]; then
                echo "Storage symlink already correct, preserving"
              else
                rm -rf "$STORAGE_LINK"
                ln -sf "$STORAGE_TARGET" "$STORAGE_LINK"
                echo "Storage symlink (re)created: $STORAGE_LINK -> $STORAGE_TARGET"
              fi

              printf '%s' "$STORAGE_TARGET" > "$FRONTEND_PUBLIC_PATH/.storage_config"
              echo "Storage config written: $FRONTEND_PUBLIC_PATH/.storage_config"
            fi

            echo "Backend and frontend deployment completed"

      - name: Deploy backend via SSH (attempt 2)
        id: backend_deploy_2
        if: steps.backend_deploy_1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        env: *backend_ssh_env
        with: *backend_ssh_with

      - name: Deploy backend via SSH (attempt 3)
        id: backend_deploy_3
        if: steps.backend_deploy_1.outcome == 'failure' && steps.backend_deploy_2.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        env: *backend_ssh_env
        with: *backend_ssh_with

      - name: Backend deploy status (non-blocking)
        if: steps.backend_deploy_1.outcome == 'failure' && steps.backend_deploy_2.outcome == 'failure' && steps.backend_deploy_3.outcome == 'failure'
        run: |
          echo "::warning::Backend deployment failed after 3 SSH attempts."
          echo "::warning::Check Hostinger SSH host/port and firewall restrictions for GitHub Actions runners."
          echo "Proceeding with remaining steps."

      - name: Upload frontend build via SCP (attempt 1)
        id: frontend_scp_1
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          timeout: 60s
          source: "frontend/build/*"
          strip_components: 2
          target: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
          overwrite: true

      - name: Upload frontend build via SCP (attempt 2)
        id: frontend_scp_2
        if: steps.frontend_scp_1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          timeout: 60s
          source: "frontend/build/*"
          strip_components: 2
          target: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
          overwrite: true

      - name: Upload frontend build via SCP (attempt 3)
        id: frontend_scp_3
        if: steps.frontend_scp_1.outcome == 'failure' && steps.frontend_scp_2.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          timeout: 60s
          source: "frontend/build/*"
          strip_components: 2
          target: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
          overwrite: true

      - name: Deployment completed
        run: echo "Backend and frontend deployment completed"
