name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend on GitHub
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
          CI: false
        run: |
          npm ci
          npm run build

      - name: Validate SSH secrets and reachability
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          set -eux

          if [ -z "${HOSTINGER_HOST}" ]; then
            echo "Missing required secret: HOSTINGER_HOST"
            exit 1
          fi

          PORT="${HOSTINGER_SSH_PORT:-65002}"
          if [ -z "${HOSTINGER_SSH_PORT}" ]; then
            echo "HOSTINGER_SSH_PORT is empty. Using default Hostinger SSH port 65002 for preflight checks."
          fi

          echo "Checking TCP reachability to ${HOSTINGER_HOST}:${PORT}"
          ok=0
          for i in 1 2 3; do
            if timeout 10 bash -lc "</dev/tcp/${HOSTINGER_HOST}/${PORT}"; then
              echo "SSH port reachable on attempt ${i}."
              ok=1
              break
            fi
            echo "Attempt ${i} failed. Retrying in 5s..."
            sleep 5
          done

          if [ "${ok}" -ne 1 ]; then
            echo "::warning::Cannot pre-verify ${HOSTINGER_HOST}:${PORT} from GitHub Actions. Continuing and letting SSH deploy step attempt connection."
            echo "If SSH deploy still fails, verify Hostinger IP/hostname, SSH port (usually 65002), and firewall/SSH access settings."
          fi

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          BRANCH: main
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
          APP_URL: ${{ secrets.APP_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          MAIL_MAILER: ${{ secrets.MAIL_MAILER }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION: ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          MAIL_FEEDBACK_TO: ${{ secrets.MAIL_FEEDBACK_TO }}
        with:
          debug: true
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          timeout: 120s
          command_timeout: 30m
          envs: REPO_URL,BRANCH,DEPLOY_PATH,APP_URL,FRONTEND_URL,MAIL_MAILER,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,MAIL_ENCRYPTION,MAIL_FROM_ADDRESS,MAIL_FROM_NAME,MAIL_FEEDBACK_TO
          script_stop: false
          script: |
            set -eux

            MAIL_MAILER="${MAIL_MAILER:-smtp}"

            upsert_env() {
              key="$1"
              val="$2"
              file="$3"

              if [ -z "${val}" ]; then
                return
              fi

              esc_val=$(printf '%s' "$val" | sed -e 's/[&/]/\\\\&/g')

              if grep -q "^${key}=" "$file"; then
                sed -i "s/^${key}=.*/${key}=${esc_val}/" "$file"
              else
                printf "\n%s=%s\n" "$key" "$val" >> "$file"
              fi
            }

            echo "Connected as $(whoami)"
            echo "Current dir: $(pwd)"
            echo "DEPLOY_PATH=$DEPLOY_PATH"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "HOSTINGER_DEPLOY_PATH is required"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "First deploy: cloning repository"
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
            else
              echo "Updating existing repository"
              cd "$DEPLOY_PATH"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"

              # Hostinger sometimes has local tracked/untracked edits (e.g. manual hotfixes).
              # Stash them to keep deploy pull fast-forwardable instead of failing.
              if [ -n "$(git status --porcelain)" ]; then
                echo "Local changes detected on server; stashing before pull"
                git stash push --include-untracked --message "deploy-autostash-${BRANCH}-$(date +%s)" || true
              fi

              git pull --ff-only origin "$BRANCH"
            fi

            echo "Deploying backend"
            cd "$DEPLOY_PATH/backend"

            if [ -f .env ]; then
              upsert_env "APP_URL" "$APP_URL" ".env"
              upsert_env "FRONTEND_URL" "$FRONTEND_URL" ".env"
              upsert_env "MAIL_MAILER" "$MAIL_MAILER" ".env"
              upsert_env "MAIL_HOST" "$MAIL_HOST" ".env"
              upsert_env "MAIL_PORT" "$MAIL_PORT" ".env"
              upsert_env "MAIL_USERNAME" "$MAIL_USERNAME" ".env"
              upsert_env "MAIL_PASSWORD" "$MAIL_PASSWORD" ".env"
              upsert_env "MAIL_ENCRYPTION" "$MAIL_ENCRYPTION" ".env"
              upsert_env "MAIL_FROM_ADDRESS" "$MAIL_FROM_ADDRESS" ".env"
              upsert_env "MAIL_FROM_NAME" "$MAIL_FROM_NAME" ".env"
              upsert_env "MAIL_FEEDBACK_TO" "$MAIL_FEEDBACK_TO" ".env"
            fi

            # Ensure Laravel runtime directories exist before composer scripts run.
            mkdir -p bootstrap/cache
            mkdir -p storage/framework/cache
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p storage/logs
            chmod -R ug+rwX bootstrap/cache storage || true

            if [ -f artisan ] && command -v composer >/dev/null 2>&1; then
              composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            else
              echo "Skipping composer install (composer/artisan not available)"
            fi

            if [ -f artisan ] && command -v php >/dev/null 2>&1; then
              if [ -f .env ]; then
                if ! grep -q "^APP_KEY=base64:" .env; then
                  php artisan key:generate --force || true
                fi
              fi

              php artisan config:clear || true
              php artisan cache:clear || true
              php artisan migrate --force || true
              php artisan optimize || true
            else
              echo "Skipping artisan commands (php/artisan not available)"
            fi

            echo "Backend deployment completed"

      - name: Prepare frontend target via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONTEND_PUBLIC_PATH: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        with:
          debug: true
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          timeout: 120s
          command_timeout: 30m
          envs: FRONTEND_PUBLIC_PATH,DEPLOY_PATH
          script_stop: false
          script: |
            set -eux

            if [ -z "$FRONTEND_PUBLIC_PATH" ]; then
              echo "HOSTINGER_FRONTEND_PUBLIC_PATH is required"
              exit 1
            fi

            if [ -z "$DEPLOY_PATH" ]; then
              echo "HOSTINGER_DEPLOY_PATH is required"
              exit 1
            fi

            mkdir -p "$FRONTEND_PUBLIC_PATH"

            cat > "$FRONTEND_PUBLIC_PATH/.htaccess" <<'EOF'
            RewriteEngine On

            # Keep backend API handled by /api bridge.
            RewriteCond %{REQUEST_URI} ^/api(/|$) [NC]
            RewriteRule ^ - [L]

            # Let existing files and folders pass through.
            RewriteCond %{REQUEST_FILENAME} -f [OR]
            RewriteCond %{REQUEST_FILENAME} -d
            RewriteRule ^ - [L]

            # SPA fallback for React Router (e.g., /login, /dashboard).
            RewriteRule . /index.html [L]
            EOF

            # Keep Let's Encrypt challenge folder, API bridge folder, storage symlink, and root SPA rewrite rules.
            find "$FRONTEND_PUBLIC_PATH" -mindepth 1 -maxdepth 1 ! -name '.well-known' ! -name 'api' ! -name 'storage' ! -name '.htaccess' -exec rm -rf {} +

            mkdir -p "$FRONTEND_PUBLIC_PATH/api"

            cat > "$FRONTEND_PUBLIC_PATH/api/.htaccess" <<'EOF'
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [L]
            EOF

            cat > "$FRONTEND_PUBLIC_PATH/api/index.php" <<EOF
            <?php
            define('LARAVEL_START', microtime(true));

            // Normalize path variables so Laravel keeps the /api prefix when routed via this bridge.
            \$uri = \$_SERVER['REQUEST_URI'] ?? '/';
            if (!str_starts_with(\$uri, '/api')) {
              \$_SERVER['REQUEST_URI'] = '/api' . (str_starts_with(\$uri, '/') ? \$uri : '/' . \$uri);
            }
            \$_SERVER['SCRIPT_NAME'] = '/index.php';
            \$_SERVER['PHP_SELF'] = '/index.php';
            unset(\$_SERVER['PATH_INFO']);

            require '${DEPLOY_PATH}/backend/vendor/autoload.php';

            \$app = require_once '${DEPLOY_PATH}/backend/bootstrap/app.php';

            \$kernel = \$app->make(Illuminate\\Contracts\\Http\\Kernel::class);

            \$response = \$kernel->handle(
                \$request = Illuminate\\Http\\Request::capture()
            )->send();

            \$kernel->terminate(\$request, \$response);
            EOF

            # Expose Laravel public storage uploads at /storage for image/files access.
            rm -rf "$FRONTEND_PUBLIC_PATH/storage"
            ln -s "$DEPLOY_PATH/backend/storage/app/public" "$FRONTEND_PUBLIC_PATH/storage"

      - name: Upload frontend build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '65002' }}
          timeout: 120s
          source: "frontend/build/*"
          strip_components: 2
          target: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
          overwrite: true

      - name: Deployment completed
        run: echo "Backend and frontend deployment completed"
