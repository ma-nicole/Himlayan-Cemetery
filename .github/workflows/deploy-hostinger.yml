name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend on GitHub
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          CI: false
        run: |
          npm ci
          npm run build

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          BRANCH: main
          DEPLOY_PATH: ${{ secrets.HOSTINGER_DEPLOY_PATH }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          envs: REPO_URL,BRANCH,DEPLOY_PATH
          script_stop: true
          script: |
            set -e

            if [ -z "$DEPLOY_PATH" ]; then
              echo "HOSTINGER_DEPLOY_PATH is required"
              exit 1
            fi

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "First deploy: cloning repository"
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
            else
              echo "Updating existing repository"
              cd "$DEPLOY_PATH"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
              git pull --ff-only origin "$BRANCH"
            fi

            echo "Deploying backend"
            cd "$DEPLOY_PATH/backend"

            if [ -f artisan ] && command -v composer >/dev/null 2>&1; then
              composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            else
              echo "Skipping composer install (composer/artisan not available)"
            fi

            if [ -f artisan ] && command -v php >/dev/null 2>&1; then
              if [ -f .env ]; then
                if ! grep -q "^APP_KEY=base64:" .env; then
                  php artisan key:generate --force || true
                fi
              fi

              php artisan migrate --force || true
              php artisan optimize || true
            else
              echo "Skipping artisan commands (php/artisan not available)"
            fi

            echo "Backend deployment completed"

      - name: Prepare frontend target via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONTEND_PUBLIC_PATH: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          envs: FRONTEND_PUBLIC_PATH
          script_stop: true
          script: |
            set -e

            if [ -z "$FRONTEND_PUBLIC_PATH" ]; then
              echo "HOSTINGER_FRONTEND_PUBLIC_PATH is required"
              exit 1
            fi

            mkdir -p "$FRONTEND_PUBLIC_PATH"

            # Keep Let's Encrypt challenge folder if present.
            find "$FRONTEND_PUBLIC_PATH" -mindepth 1 -maxdepth 1 ! -name '.well-known' -exec rm -rf {} +

      - name: Upload frontend build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          passphrase: ${{ secrets.HOSTINGER_SSH_PASSPHRASE }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          source: "frontend/build/*"
          target: ${{ secrets.HOSTINGER_FRONTEND_PUBLIC_PATH }}
          overwrite: true

      - name: Deployment completed
        run: echo "Backend and frontend deployment completed"
